name: Deploy static content to Pages

on:
  push:
    branches: ['main']
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: 'pages'
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      # 1. 升级 checkout 到 v5
      - name: Checkout
        uses: actions/checkout@v5

      # 2. 升级 setup-node 到 v5，指定 Node.js 24
      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: '24'
          cache: 'npm'

      # 3. 添加详细日志，方便排查依赖安装问题
      - name: Install dependencies
        run: npm install --loglevel verbose

      # 4. 添加详细日志，定位构建失败原因
      - name: Build project
        run: npm run build --loglevel verbose

      # 5. 上传构建产物（路径需与项目实际输出一致）
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./dist # 替换为项目实际的构建输出目录（如 dist、build 等）

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
